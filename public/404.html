<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tc-travel</title>
    <script>
      // GitHub Pages serves this for any unknown sub-path. Older builds shared
      // room links as a real "/join/<roomId>" path (missing the "#"), which a
      // static host can't serve — rewrite those to the SPA's hash route. For
      // anything else, fall back to the app root (first path segment keeps the
      // project-pages base, e.g. /tc-travel/).
      (function () {
        var m = location.pathname.match(/^(.*?)\/{1,2}join\/([A-Za-z0-9_-]{1,128})\/?$/);
        if (m) {
          var base = m[1] || "";
          if (!base.endsWith("/")) base += "/";
          location.replace(location.origin + base + "#/join/" + m[2]);
          return;
        }
        var seg = location.pathname.split("/")[1] || "";
        var target = location.origin + (seg ? "/" + seg + "/" : "/");
        // Never redirect to the URL we're already on — if the base itself is
        // missing, that would loop through this page forever.
        if (target !== location.href) location.replace(target);
      })();
    </script>
  </head>
  <body>
    <noscript>Not found.</noscript>
  </body>
</html>
